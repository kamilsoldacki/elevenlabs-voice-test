# After enabling GitHub Pages (Settings → Pages → Source: GitHub Actions), push to the default branch (e.g. main).

name: Deploy static site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Do not use cache: npm until package-lock.json is committed — without a lockfile
      # setup-node often fails fast with "Dependencies lock file is not found".
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Compute Vite base path
        id: vite_base
        shell: bash
        run: |
          set -euo pipefail
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO_NAME" = "${OWNER}.github.io" ]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
            echo "User pages site → VITE_BASE_PATH=/"
          else
            echo "path=/${REPO_NAME}/" >> "$GITHUB_OUTPUT"
            echo "Project pages site → VITE_BASE_PATH=/${REPO_NAME}/"
          fi

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        env:
          VITE_BASE_PATH: ${{ steps.vite_base.outputs.path }}
        run: npm run build

      - name: List build output
        run: ls -la dist

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
