# Po włączeniu GitHub Pages (Settings → Pages → Source: GitHub Actions) wypchnij ten plik na domyślną gałąź (np. main).

name: Deploy static site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm install

      - name: Ustaw ścieżkę Vite pod GitHub Pages
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO_NAME" = "${OWNER}.github.io" ]; then
            echo "Strona użytkownika → base /"
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "Projekt pod /${REPO_NAME}/"
            echo "VITE_BASE_PATH=/${REPO_NAME}/" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
